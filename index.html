<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="300">
    <title>Watchlist Dinámica - Texto Plano</title>
    <style>
        body {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            white-space: pre-wrap;
            background-color: #0a0a0a;
            color: #e0e0e0;
            padding: 30px;
            font-size: 12px;
            line-height: 1.6;
            margin: 0;
            overflow-x: auto;
        }
        .pos { color: #00ff88; font-weight: bold; }
        .neg { color: #ff4444; font-weight: bold; }
        #monitor {
            background: #111;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: inline-block;
            min-width: fit-content;
        }
    </style>
</head>

<body>
    <div id="monitor">Cargando datos de la Watchlist...</div>

    <script>
        // Lista de criptomonedas
        const coins = [
            { id: 'bitcoin', symbol: 'BTC', name: 'Bitcoin' },
            { id: 'ethereum', symbol: 'ETH', name: 'Ethereum' },
            { id: 'tether', symbol: 'USDT', name: 'Tether' },
            { id: 'binancecoin', symbol: 'BNB', name: 'BNB' },
            { id: 'solana', symbol: 'SOL', name: 'Solana' },
            { id: 'avalanche-2', symbol: 'AVAX', name: 'Avalanche' },
            { id: 'sui', symbol: 'SUI', name: 'Sui' },
            { id: 'mantle', symbol: 'MNT', name: 'Mantle' },
            { id: 'arbitrum', symbol: 'ARB', name: 'Arbitrum' },
            { id: 'nexo', symbol: 'NEXO', name: 'Nexo' },
            { id: 'aerodrome-finance', symbol: 'AERO', name: 'Aerodrome Finance' },
            { id: 'ronin', symbol: 'RON', name: 'Ronin' },
            { id: 'momentum-3', symbol: 'MMT', name: 'Momentum' },
            { id: 'thena', symbol: 'THE', name: 'THENA' },
            { id: 'ripple', symbol: 'XRP', name: 'XRP' },
            { id: 'monero', symbol: 'XMR', name: 'Monero' },
            { id: 'bittensor', symbol: 'TAO', name: 'Bittensor' },
            { id: 'kaspa', symbol: 'KAS', name: 'Kaspa' },
            { id: 'plasma', symbol: 'XPL', name: 'Plasma' },
            { id: 'linea', symbol: 'LINEA', name: 'Linea' },
            { id: 'chia', symbol: 'XCH', name: 'Chia' },
            { id: 'xpin-network', symbol: 'XPIN', name: 'XPIN Network' },
            { id: 'klever', symbol: 'KLV', name: 'Klever Coin' },
            { id: 'foxy', symbol: 'FOXY', name: 'Foxy' },
            { id: 'hyperliquid', symbol: 'HYPE', name: 'Hyperliquid' }
        ];

        // Función para acortar números grandes (ej: 1.5T, 20B)
        function formatLargeNum(num) {
            if (num === null || num === undefined) return "N/A";
            if (num >= 1e12) return (num / 1e12).toFixed(2) + "T";
            if (num >= 1e9) return (num / 1e9).toFixed(2) + "B";
            if (num >= 1e6) return (num / 1e6).toFixed(2) + "M";
            return num.toLocaleString('en-US', { maximumFractionDigits: 0 });
        }

        let lastOutput = "";

        async function traerDolarBlue() {
            try {
                const res = await fetch('https://dolarapi.com/v1/dolares/blue');
                const data = await res.json();
                return `Dólar Blue: Compra $${Math.round(data.compra)} - Venta $${Math.round(data.venta)}`;
            } catch (e) { return "Dólar Blue: Error"; }
        }

        async function traerCriptoDatos() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/global');
                const json = await res.json();
                const d = json.data.market_cap_percentage;
                const btcDom = d.btc;
                const ethDom = d.eth;
                const altsDom = 100 - btcDom - ethDom;

                let altIndex = Math.round(100 - ((btcDom - 35) * 3.33));
                if (altIndex > 100) altIndex = 100; if (altIndex < 0) altIndex = 0;
                let l = altIndex >= 75 ? "Altcoin Season" : (altIndex <= 35 ? "Bitcoin Season" : "Neutral");

                return {
                    dominance: `Dominancia: BTC ${btcDom.toFixed(1)}% - ETH ${ethDom.toFixed(1)}% - ALTS ${altsDom.toFixed(1)}%`,
                    altcoinSeason: `Altcoin Index: ${altIndex} (${l})`
                };
            } catch (e) { return { dominance: "Dominancia: Error", altcoinSeason: "Altcoin Index: Error" }; }
        }

        async function traerFearGreedBitcoin() {
            try {
                const res = await fetch('https://api.alternative.me/fng/?limit=1');
                const data = await res.json();
                const val = data.data[0].value;
                const label = data.data[0].value_classification;
                return `Fear & Greed: ${val} (${label})`;
            } catch (e) { return "Fear & Greed: Error"; }
        }

        async function fetchWatchlist() {
            try {
                const ids = coins.map(c => c.id).join(',');
                // Usar endpoint 'markets' para obtener supply, vol y porcentajes extra
                const res = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&price_change_percentage=1h,24h,7d`);
                const data = await res.json();

                // Obtener indicadores adicionales
                const [dolar, cripto, fg] = await Promise.all([
                    traerDolarBlue(),
                    traerCriptoDatos(),
                    traerFearGreedBitcoin()
                ]);

                let output = "";

                // Construir Cabeceras
                output += "Moneda".padEnd(28);
                output += "Precio".padStart(12) + "  ";
                output += "1h".padStart(8) + "  ";
                output += "24h".padStart(8) + "  ";
                output += "7d".padStart(8) + "  ";
                output += "MarketCap".padStart(10) + "  ";
                output += "Vol(24h)".padStart(10) + "  ";
                output += "Vol/MCap".padStart(10) + "  ";
                output += "Circ. Supply".padStart(15) + "\n";


                // Ordenar por Market Cap descending
                const capMap = new Map(data.map(c => [c.id, c.market_cap || 0]));
                const sortedCoins = [...coins].sort((a, b) => (capMap.get(b.id) || 0) - (capMap.get(a.id) || 0));

                sortedCoins.forEach(coinReq => {
                    const coin = data.find(c => c.id === coinReq.id);
                    if (coin) {
                        // Formatear precio (2 decimales para altos, 4 para bajos)
                        let priceStr = "$" + coin.current_price.toLocaleString('en-US', {
                            minimumFractionDigits: coin.current_price < 1 ? 4 : 2,
                            maximumFractionDigits: coin.current_price < 1 ? 4 : 2
                        });

                        // Función helper para porcentajes con color
                        const formatPct = (val, pad) => {
                            if (val === null || val === undefined) return "N/A".padStart(pad);
                            const valStr = (val > 0 ? "+" : "") + val.toFixed(2) + "%";
                            const colorClass = val > 0 ? "pos" : (val < 0 ? "neg" : "");
                            const padded = valStr.padStart(pad);
                            if (!colorClass) return padded;
                            return padded.replace(valStr, `<span class="${colorClass}">${valStr}</span>`);
                        };

                        let ch1Str = formatPct(coin.price_change_percentage_1h_in_currency, 8);
                        let ch24Str = formatPct(coin.price_change_percentage_24h_in_currency, 8);
                        let ch7Str = formatPct(coin.price_change_percentage_7d_in_currency, 8);

                        let mcapStr = "$" + formatLargeNum(coin.market_cap);
                        let volStr = "$" + formatLargeNum(coin.total_volume);
                        let volMcStr = "N/A";
                        if (coin.market_cap && coin.total_volume) {
                            let ratio = (coin.total_volume / coin.market_cap) * 100;
                            volMcStr = ratio.toFixed(2) + "%";
                        }
                        let supplyStr = formatLargeNum(coin.circulating_supply) + " " + coinReq.symbol;

                        // Construir fila alineada
                        const nameSym = `${coinReq.name} (${coinReq.symbol})`;
                        output += nameSym.padEnd(28);
                        output += priceStr.padStart(12) + "  ";
                        output += ch1Str + "  ";
                        output += ch24Str + "  ";
                        output += ch7Str + "  ";
                        output += mcapStr.padStart(10) + "  ";
                        output += volStr.padStart(10) + "  ";
                        output += volMcStr.padStart(10) + "  ";
                        output += supplyStr.padStart(15) + "\n";
                    } else {
                        output += `${coinReq.name} (${coinReq.symbol}) - Datos no disponibles\n`;
                    }
                });

                // Agregar indicadores al final (sin separador inicial)
                output += "\n" + dolar + "\n";
                output += cripto.dominance + "\n";
                output += cripto.altcoinSeason + " - " + fg + "\n";
                lastOutput = output;

                renderContent();

            } catch (e) {
                lastOutput = "Error al cargar los datos.\nPuede deberse a límites de la API, intente en un momento.";
                renderContent();
                console.error(e);
            }
        }
        let timeLeft = 300; // 5 minutos en segundos

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function renderContent() {
            if (lastOutput) {
                document.getElementById('monitor').innerHTML = lastOutput + `\nPróxima actualización en: ${formatTime(timeLeft)}`;
            }
        }

        // Carga inicial
        fetchWatchlist();

        // Actualizar el contador y refrescar al llegar a 0
        setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                location.reload();
            } else {
                renderContent();
            }
        }, 1000);
    </script>
</body>

</html>
