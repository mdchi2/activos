<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Monitor Financiero - Dark Mode</title>

<style>
/* Configuración de Fondo y Cuerpo */
body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #0f172a; /* Azul noche profundo */
display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #e2e8f0;
}
/* Contenedor Principal (Card) */
.card { background: #1e293b; /* Gris azulado oscuro */
padding: 25px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 100%; max-width: 340px; border: 1px solid #334155;
}
h2 { text-align: center; color: #f8fafc; margin-top: 0; font-size: 1.5rem; margin-bottom: 25px; letter-spacing: -0.5px;
}
/* Cajas de Información */
.info-box { background: #334155; padding: 16px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #475569; border-left: 6px solid #10b981; /* Verde esmeralda */
transition: transform 0.2s;
}
/* Colores de acento laterales */
.cripto-box { border-left-color: #fbbf24; } /* Amarillo */
.btc-box { border-left-color: #f97316; } /* Naranja */
.dominance-box { border-left-color: #a855f7; } /* Púrpura */
.title { font-weight: 700; color: #94a3b8; display: block; margin-bottom: 10px; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; }
.row { display: flex; justify-content: space-between; align-items: baseline; }
.label { color: #64748b; font-size: 0.65rem; font-weight: 600; display: block; margin-bottom: 4px; }
.col { display: flex; flex-direction: column; text-align: center; flex: 1; }
/* Valores Numéricos */
.valor-num { font-size: 1.5rem; color: #38bdf8; /* Azul claro brillante */
font-weight: 800;
}
.row-prices {
color: #4ade80; /* Verde brillante para precios */
font-size: 1.3rem;
font-weight: 800;
}
.estado-texto { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; color: #fb923c; }
.dom-val { font-size: 1.1rem; color: #f1f5f9; font-weight: 700; }
.loading { text-align: center; color: #64748b; font-size: 0.9rem; padding: 10px; }
</style>
</head>
<body>
<div class="card">
<h2>Monitor En Vivo</h2>
<div id="blue" class="info-box">
<span class="title">Dólar Blue</span>
<div class="loading">Cargando...</div>
</div>
<div id="cripto" class="info-box cripto-box">
<span class="title">Dólar Cripto (USDT)</span>
<div class="loading">Cargando...</div>
</div>
<div id="dominance" class="info-box dominance-box">
<span class="title">Dominancia del Mercado</span>
<div class="loading">Cargando...</div>
</div>
<div id="fg-index" class="info-box btc-box">
<span class="title">BTC Fear &amp; Greed Index</span>
<div class="loading">Cargando...</div>
</div>
</div>
<script>
async function traerDolar(tipo, elementId) {
try {
const res = await fetch(`https://dolarapi.com/v1/dolares/${tipo}`);
const data = await res.json();
const div = document.getElementById(elementId);
const nombre = tipo === 'blue' ? 'Blue' : 'Cripto';
div.innerHTML = `
<span class="title">Dólar ${nombre}</span>
<div class="row row-prices">
<div class="col"><span class="label">COMPRA</span>$${Math.round(data.compra)}</div>
<div class="col"><span class="label">VENTA</span>$${Math.round(data.venta)}</div>
</div>`;
} catch (e) {
document.getElementById(elementId).innerHTML = "<div class='loading'>Error de conexión</div>";
}
}
async function traerDominancia() {
try {
const res = await fetch('https://api.coingecko.com/api/v3/global');
const json = await res.json();
const data = json.data.market_cap_percentage;
const btc = data.btc.toFixed(1);
const eth = data.eth.toFixed(1);
const alts = (100 - data.btc - data.eth).toFixed(1);
const div = document.getElementById('dominance');
div.innerHTML = `
<span class="title">Dominancia de Mercado</span>
<div class="row">
<div class="col"><span class="label">BTC</span><span class="dom-val">${btc}%</span></div>
<div class="col"><span class="label">ETH</span><span class="dom-val">${eth}%</span></div>
<div class="col"><span class="label">ALTS</span><span class="dom-val">${alts}%</span></div>
</div>`;
} catch (e) {
document.getElementById('dominance').innerHTML = "<div class='loading'>Error API</div>";
}
}
async function traerFearGreed() {
try {
const res = await fetch('https://api.alternative.me/fng/');
const data = await res.json();
const fng = data.data[0];
const div = document.getElementById('fg-index');
div.innerHTML = `
<span class="title">Sentimiento BTC</span>
<div class="row">
<div class="valor-num">${fng.value}</div>
<div class="estado-texto">${fng.value_classification}</div>
</div>`;
} catch (e) {
document.getElementById('fg-index').innerHTML = "<div class='loading'>Error API</div>";
}
}
// Llamadas iniciales
traerDolar('blue', 'blue');
traerDolar('cripto', 'cripto');
traerDominancia();
traerFearGreed();
</script>
</body></html>
