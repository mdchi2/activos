<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Cripto y Dólar - Texto Plano</title>
    <style>
        body {
            font-family: monospace;
            white-space: pre-wrap;
            background-color: #000;
            color: #fff;
            padding: 20px;
            font-size: 16px;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div id="monitor">Cargando datos...</div>
    <div id="reloj"></div>

    <script>
        let tiempoRestante = 600; // 10 minutos

        async function traerDolarBlue() {
            try {
                const res = await fetch('https://dolarapi.com/v1/dolares/blue');
                const data = await res.json();
                return `Dólar Blue:\n  Compra: $${Math.round(data.compra)}\n  Venta:  $${Math.round(data.venta)}`;
            } catch (e) { return "Dólar Blue: Error al cargar"; }
        }

        async function traerCriptoDatos() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/global');
                const json = await res.json();
                const d = json.data.market_cap_percentage;
                const btcDom = d.btc;
                const ethDom = d.eth;
                const altsDom = 100 - btcDom - ethDom;

                let altIndex = Math.round(100 - ((btcDom - 35) * 3.33));
                if (altIndex > 100) altIndex = 100; if (altIndex < 0) altIndex = 0;
                let l = altIndex >= 75 ? "Altcoin Season" : (altIndex <= 35 ? "Bitcoin Season" : "Neutral");

                return `Dominancia de Mercado:\n  BTC:  ${btcDom.toFixed(1)}%\n  ETH:  ${ethDom.toFixed(1)}%\n  ALTS: ${altsDom.toFixed(1)}%\n\nAltcoin Season Index:\n  ${altIndex} - ${l}`;
            } catch (e) { return "Datos Cripto: Error al cargar"; }
        }

        async function traerFearGreedBitcoin() {
            try {
                const res = await fetch('https://api.alternative.me/fng/?limit=1');
                const data = await res.json();
                const val = data.data[0].value;
                const label = data.data[0].value_classification;
                return `Fear & Greed Bitcoin:\n  ${val} - ${label}`;
            } catch (e) { return "Fear & Greed: Error al cargar"; }
        }

        async function cargarTodo() {
            document.getElementById('monitor').innerText = "Cargando datos...";

            const [dolar, cripto, fg] = await Promise.all([
                traerDolarBlue(),
                traerCriptoDatos(),
                traerFearGreedBitcoin()
            ]);

            document.getElementById('monitor').innerText =
                "=== MONITOR EN VIVO ===\n\n" +
                dolar + "\n\n" +
                cripto + "\n\n" +
                fg;
            
            tiempoRestante = 600;
            actualizarReloj();
        }

        function actualizarReloj() {
            const min = Math.floor(tiempoRestante / 60);
            const seg = tiempoRestante % 60;
            document.getElementById('reloj').innerText = `\n=======================\nPróxima actualización en: ${min}:${seg.toString().padStart(2, '0')}`;
        }

        setInterval(() => {
            tiempoRestante--;
            if (tiempoRestante <= 0) {
                cargarTodo();
            } else {
                actualizarReloj();
            }
        }, 1000);

        cargarTodo();
    </script>
</body>

</html>
